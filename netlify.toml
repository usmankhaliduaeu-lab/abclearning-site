[build]
  publish = "."

# Pretty URLs: /suggest -> suggest.html, etc.
[[redirects]]
  from = "/suggest"
  to = "/suggest.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/worksheets"
  to = "/worksheets.html"
  status = 200

[[redirects]]
  from = "/maths"
  to = "/maths.html"
  status = 200

[[redirects]]
  from = "/phonics"
  to = "/phonics.html"
  status = 200

[[redirects]]
  from = "/art"
  to = "/art.html"
  status = 200

# Open PDFs inline in the browser (enables print dialog)
[[headers]]
  for = "/pdfs/*"
  [headers.values]
    Content-Disposition = "inline"
    Cache-Control = "public, max-age=86400"

# Thumbnails are immutable — cache aggressively
[[headers]]
  for = "/thumbnails/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# data.json refreshes every 5 minutes
[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
